<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EM Y FIN Source Logo</title>
  <style>
    body {
      margin: 0;
      background: transparent; /* important for iframe */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>
<body>

<svg width="520" height="260" viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient -->
  <defs>
    <linearGradient id="gradArrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#43b8fd"/>
      <stop offset="100%" stop-color="#43b8fd"/>
    </linearGradient>
  </defs>

  <!-- Line 1 -->
  <text x="50" y="90"
        font-size="50"
        font-family="Segoe UI, Arial, sans-serif"
        font-weight="700"
        fill="#111">
    <tspan>EM</tspan>
    <tspan dx="25">Y</tspan>
  </text>

  <!-- Underline -->
  <line x1="50" y1="105" x2="200" y2="105"
        stroke="#111"
        stroke-width="5"
        stroke-linecap="round" />

  <!-- Line 2 -->
  <text x="50" y="165"
        font-size="50"
        font-family="Segoe UI, Arial, sans-serif"
        fill="#222">
    <tspan font-weight="700">FIN</tspan>
    <tspan dx="25">Source</tspan>
  </text>

  <!-- Arrow -->
  <path d="M 135 200
           C 135 150, 135 120, 135 100
           C 135 85, 140 75, 150 85
           C 165 100, 180 110, 200 95
           C 220 80, 230 70, 230 50"
        fill="none"
        stroke="url(#gradArrow)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-dasharray="500"
        stroke-dashoffset="500">

    <animate attributeName="stroke-dashoffset"
             from="500"
             to="0"
             dur="2.2s"
             calcMode="spline"
             keySplines="0.4 0 0.2 1"
             fill="freeze" />
  </path>

  <!-- Arrow Head -->
  <polygon points="230,40 220,65 240,65"
           fill="#43b8fd"
           opacity="0">

    <animate attributeName="opacity"
             from="0"
             to="1"
             dur="0.4s"
             begin="1.8s"
             fill="freeze" />
  </polygon>

</svg>

</body>
</html>
